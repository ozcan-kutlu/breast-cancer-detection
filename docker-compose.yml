# Yerel kullanım: tarayıcı http://localhost:3000 → JS istekleri host üzerinden http://localhost:8000/api/... (API konteyneri).
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: breast-cancer-api:latest
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    image: breast-cancer-web:latest
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
