services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: breast-cancer-api:latest
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: breast-cancer-web:latest
    environment:
      BACKEND_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
