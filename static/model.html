<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model — Demo</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-app-page="model">
    <div class="page">
      <nav class="nav-top">
        <a href="/" data-i18n="nav.predictLink">← Tahmin sayfası</a>
        <div
          class="lang-switch"
          role="group"
          data-i18n-aria="lang.groupAria"
          aria-label="Dil seçimi"
        >
          <button type="button" class="lang-btn" data-lang-set="tr" aria-pressed="true">
            TR
          </button>
          <button type="button" class="lang-btn" data-lang-set="en" aria-pressed="false">
            EN
          </button>
        </div>
      </nav>

      <header class="header">
        <h1 data-i18n="model.h1">Model özeti</h1>
        <p class="lead" data-i18n-html="model.leadHtml"></p>
      </header>

      <section id="model-meta" class="model-meta" aria-live="polite"></section>

      <section class="viz-section">
        <h2 class="viz-title" data-i18n="model.sectionImportance">Özellik önemleri</h2>
        <div id="importance-bars" class="importance-list"></div>
      </section>

      <section class="viz-section">
        <h2 class="viz-title" data-i18n="model.sectionTree">Örnek karar ağacı</h2>
        <p class="viz-note" data-i18n="model.treeNote"></p>
        <div class="tree-wrap">
          <img
            id="tree-img"
            src="/api/model/tree.png"
            alt=""
            class="tree-img"
            data-i18n-alt="model.treeAlt"
          />
        </div>
        <p id="tree-error" class="error hidden"></p>
      </section>

      <footer class="footer">
        <p data-i18n="model.footer"></p>
      </footer>
    </div>
    <script src="/assets/i18n.js"></script>
    <script src="/assets/model.js"></script>
  </body>
</html>
